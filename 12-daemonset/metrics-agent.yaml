apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metrics-agent
  namespace: voting
  labels:
    app: metrics-agent
spec:
  selector:
    matchLabels:
      app: metrics-agent
  template:
    metadata:
      labels:
        app: metrics-agent
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[$(date)] Node=$NODE_NAME — Pods=$(ls /var/log/pods/ 2>/dev/null | wc -l)"
                sleep 30
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: pod-logs
          hostPath:
            path: /var/log/pods
