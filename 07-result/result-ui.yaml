apiVersion: v1
kind: Service
metadata:
  name: result-ui
  namespace: voting
spec:
  selector:
    app: result-ui
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-ui
  namespace: voting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: result-ui
  template:
    metadata:
      labels:
        app: result-ui
    spec:
      containers:
        - name: result-ui
          image: mohamed1780/result-ui
          ports:
            - containerPort: 80
          env:
            - name: RESULT_API_URL
              value: "http://result:5000"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
