apiVersion: v1
kind: Service
metadata:
  name: vote
  namespace: voting
spec:
  selector:
    app: vote
  ports:
    - port: 5000
      targetPort: 5000
  # ClusterIP (interne uniquement) — vote-ui l'appelle via http://vote:5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  namespace: voting
  annotations:
    kubernetes.io/change-cause: "déploiement initial"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vote
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: mohamed1780/vote
          ports:
            - containerPort: 5000
          env:
            - name: OPTION_A
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: OPTION_A
            - name: OPTION_B
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: OPTION_B
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: voting-config
                  key: REDIS_PORT
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
